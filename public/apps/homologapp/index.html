<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Homologapp | Innova-Souvenir</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #07111f;
        background: #f6f9fc;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 78% 8%, rgba(11, 145, 232, .18), transparent 28%),
          linear-gradient(135deg, #07111f 0 36%, #f6f9fc 36% 100%);
      }
      main {
        width: min(760px, 100%);
        border: 1px solid #d8e6f1;
        border-radius: 10px;
        padding: clamp(24px, 5vw, 44px);
        background: white;
        box-shadow: 0 24px 70px rgba(5, 17, 32, .18);
      }
      .eyebrow {
        margin: 0 0 10px;
        color: #0b91e8;
        font-size: 13px;
        font-weight: 900;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        color: #0a1f38;
        font-size: clamp(36px, 8vw, 68px);
        line-height: .96;
      }
      p {
        color: #4b6278;
        font-size: 18px;
        line-height: 1.55;
      }
      .meta {
        margin-top: 24px;
        padding-top: 18px;
        border-top: 1px solid #d8e6f1;
        color: #60758a;
        font-size: 14px;
        font-weight: 800;
        text-transform: uppercase;
      }
      a {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 24px;
        border-radius: 8px;
        padding: 12px 16px;
        color: white;
        background: #0a1f38;
        font-weight: 900;
        text-decoration: none;
      }
      a:hover {
        background: #0b91e8;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Herramienta HTML</p>
      <h1>Homologapp</h1>
      <p>
        Aplicación para homologar acuerdos de pago en apremios. Calcula tasa, sobretasa y aportes,
        e incluye una calculadora para verificar si los aportes están cumplidos.
      </p>
      <p class="meta">Creado por Juan Manuel Rilo</p>
      <a href="https://drive.google.com/open?id=17sM4fFcuISjeRRa5VUqQvkMT3OUlHxRB" target="_blank" rel="noreferrer">
        Abrir herramienta original
      </a>
    </main>
  </body>
</html>
